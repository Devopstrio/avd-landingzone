apiVersion: apps/v1
kind: Deployment
metadata:
  name: lz-platform-api
  namespace: avd-lz-prod
  labels:
    app: lz-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lz-api
  template:
    metadata:
      labels:
        app: lz-api
    spec:
      containers:
      - name: gateway
        image: acrlz.azurecr.io/devopstrio/lz-api:v1.2.0
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: lz-secrets
              key: db-url
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: lz-api-svc
  namespace: avd-lz-prod
spec:
  selector:
    app: lz-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-engine
  namespace: avd-lz-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      engine: governance
  template:
    metadata:
      labels:
        engine: governance
    spec:
      containers:
      - name: audit-worker
        image: acrlz.azurecr.io/devopstrio/governance-engine:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lz-ingress
  namespace: avd-lz-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - lz.devopstrio.co.uk
    secretName: lz-portal-tls
  rules:
  - host: lz.devopstrio.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lz-api-svc
            port:
              number: 80
